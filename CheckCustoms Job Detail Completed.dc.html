<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { margin: 0; } ::selection { background: oklch(40% 0.15 255); color: oklch(98% 0.005 90); } </style>
</helmet>

<div style="font-family:'Work Sans',sans-serif; color:oklch(18% 0.015 260); background:oklch(98% 0.006 90); min-height:100vh; display:grid; grid-template-columns:260px 1fr;">

  <!-- SIDEBAR -->
  <div style="background:oklch(99% 0.004 90); border-right:1px solid oklch(90% 0.008 90); padding:28px 20px; display:flex; flex-direction:column;">
    <a href="CheckCustoms Landing.dc.html" style="font-family:'Spectral',serif; font-weight:600; font-size:20px; letter-spacing:-0.01em; margin-bottom:40px; padding:0 8px; color:oklch(18% 0.015 260); text-decoration:none; display:block;">CheckCustoms<span style="color:oklch(55% 0.16 250);">.ng</span></a>
    <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="6">
      <a href="{{ item.href }}" style="{{ item.style }}text-decoration:none;">
        <div style="width:8px; height:8px; border-radius:999px; background:{{ item.dotColor }}; flex-shrink:0;"></div>
        <span>{{ item.label }}</span>
      </a>
    </sc-for>
  </div>

  <!-- MAIN -->
  <div style="min-width:0;">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:24px 48px; border-bottom:1px solid oklch(90% 0.008 90); background:oklch(99% 0.004 90);">
      <a href="CheckCustoms My Jobs.dc.html" style="font-size:13px; color:oklch(45% 0.02 260); text-decoration:none;">← Back to My Jobs</a>
      <div style="width:36px; height:36px; border-radius:999px; background:oklch(40% 0.15 255); color:oklch(98% 0.005 90); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px;">A</div>
    </div>

    <div style="padding:40px 48px; max-width:900px;">
      <!-- JOB HEADER -->
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px;">
        <div>
          <div style="font-family:'Spectral',serif; font-size:26px; font-weight:600;">General cargo — Textiles</div>
          <div style="font-size:13px; color:oklch(50% 0.02 260); margin-top:6px;">Job CC-48155</div>
        </div>
        <div style="font-size:13px; font-weight:600; color:oklch(98% 0.005 90); background:oklch(40% 0.13 150); padding:9px 18px; border-radius:999px;">✓ Delivered</div>
      </div>

      <!-- FULL PIPELINE -->
      <div style="background:oklch(99% 0.004 90); border:1px solid oklch(88% 0.008 90); padding:32px; margin-bottom:24px;">
        <div style="display:flex; align-items:flex-start; gap:2px; margin-bottom:8px; overflow-x:auto;">
          <sc-for list="{{ stages }}" as="stage" hint-placeholder-count="8">
            <div style="display:flex; flex-direction:column; align-items:center; flex:1 1 0; min-width:64px;">
              <div style="{{ stage.dotStyle }}">{{ stage.mark }}</div>
              <div style="{{ stage.labelStyle }}">{{ stage.title }}</div>
            </div>
          </sc-for>
        </div>
        <div style="height:4px; background:oklch(40% 0.13 150); border-radius:999px; margin-top:8px;"></div>
      </div>

      <!-- SUMMARY DETAILS -->
      <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:24px; margin-bottom:28px;">
        <div style="background:oklch(96% 0.008 240); padding:22px; border-top:3px solid oklch(40% 0.13 150);">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 260); margin-bottom:8px;">Handled by</div>
          <div style="font-size:15px; font-weight:600;">Tunde A. — Agent</div>
        </div>
        <div style="background:oklch(96% 0.008 240); padding:22px; border-top:3px solid oklch(40% 0.13 150);">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 260); margin-bottom:8px;">Request to delivery</div>
          <div style="font-size:15px; font-weight:600;">6 days</div>
        </div>
        <div style="background:oklch(96% 0.008 240); padding:22px; border-top:3px solid oklch(40% 0.13 150);">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:oklch(50% 0.02 260); margin-bottom:8px;">Total paid</div>
          <div style="font-size:15px; font-weight:600;">₦2,590,000</div>
        </div>
      </div>

      <!-- DOCUMENTS RECAP -->
      <div style="background:oklch(99% 0.004 90); border:1px solid oklch(88% 0.008 90); padding:28px; margin-bottom:24px;">
        <div style="font-family:monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:oklch(45% 0.02 260); margin-bottom:16px;">Documents</div>
        <sc-for list="{{ documents }}" as="d" hint-placeholder-count="3">
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid oklch(92% 0.006 90); font-size:14px;">
            <span>{{ d }}</span>
            <span style="font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; background:oklch(94% 0.03 150); color:oklch(40% 0.1 150);">Verified</span>
          </div>
        </sc-for>
      </div>

      <!-- ACTIONS -->
      <div style="display:flex; align-items:center; gap:24px;">
        <a href="CheckCustoms Payments.dc.html" style="color:oklch(40% 0.15 255); text-decoration:none; font-weight:600; font-size:14px; padding:12px 22px; border:1px solid oklch(40% 0.15 255); border-radius:999px;">View receipt</a>
        <a href="CheckCustoms Vehicle Estimator.dc.html" style="font-size:14px; color:oklch(45% 0.02 260); text-decoration:none;">Start a new estimate →</a>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  navLabels = ['Overview', 'My Jobs', 'Saved Estimates', 'Documents', 'Payments & Receipts', 'Account'];
  stagesData = ['Request', 'Quote', 'Payment', 'Documentation', 'Duty payment', 'Examination', 'Release', 'Delivery'];
  documentsData = ['Bill of Lading', 'Commercial Invoice', 'Form M / PAAR reference'];

  renderVals() {
    const navItems = this.navLabels.map((label, i) => {
      const active = i === 1;
      const hrefs = ['CheckCustoms Dashboard.dc.html', 'CheckCustoms My Jobs.dc.html', 'CheckCustoms Saved Estimates.dc.html', 'CheckCustoms Documents.dc.html', 'CheckCustoms Payments.dc.html', 'CheckCustoms Account.dc.html'];
      return {
        label, href: hrefs[i],
        dotColor: active ? 'oklch(40% 0.15 255)' : 'oklch(85% 0.008 90)',
        style: `display:flex; align-items:center; gap:12px; padding:12px 10px; border-radius:8px; font-size:14px; font-weight:${active ? 600 : 500}; color:${active ? 'oklch(18% 0.015 260)' : 'oklch(45% 0.02 260)'}; background:${active ? 'oklch(96% 0.008 240)' : 'transparent'}; margin-bottom:4px;`
      };
    });

    const stages = this.stagesData.map((title, i) => {
      const isLast = i === this.stagesData.length - 1;
      return {
        title,
        mark: '✓',
        dotStyle: `width:36px; height:36px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-family:'Spectral',serif; font-size:14px; font-weight:700; margin-bottom:8px; background:oklch(40% 0.13 150); color:oklch(98% 0.005 90); ${isLast ? 'box-shadow:0 0 0 4px oklch(40% 0.13 150 / 0.2);' : ''}`,
        labelStyle: `font-size:10px; text-align:center; line-height:1.25; word-break:break-word; padding:0 2px; font-weight:${isLast ? 600 : 500}; color:oklch(18% 0.015 260);`
      };
    });

    return { navItems, stages, documents: this.documentsData };
  }
}
</script>
</body>
</html>
