<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style> body { margin: 0; } ::selection { background: oklch(40% 0.15 255); color: oklch(98% 0.005 90); } </style>
</helmet>

<div style="font-family:'Work Sans',sans-serif; color:oklch(18% 0.015 260); background:oklch(98% 0.006 90); min-height:100vh;">

  <!-- SIMPLIFIED HEADER -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:24px 48px; border-bottom:1px solid oklch(90% 0.008 90); background:oklch(99% 0.004 90);">
    <a href="CheckCustoms Landing.dc.html" style="font-family:'Spectral',serif; font-weight:600; font-size:20px; letter-spacing:-0.01em; color:oklch(18% 0.015 260); text-decoration:none;">CheckCustoms<span style="color:oklch(55% 0.16 250);">.ng</span></a>
    <div style="display:flex; align-items:center; gap:24px;">
      <a onClick="{{ onBack }}" style="font-size:13px; color:oklch(45% 0.02 260); text-decoration:none; cursor:pointer;">← Back</a>
      <a href="CheckCustoms Dashboard.dc.html" style="font-size:13px; color:oklch(45% 0.02 260); text-decoration:none;">Save & exit</a>
    </div>
  </div>

  <div style="max-width:640px; margin:0 auto; padding:48px 32px 100px;">
    <!-- STEP PROGRESS -->
    <div style="margin-bottom:36px;">
      <div style="font-size:12px; font-weight:600; color:oklch(40% 0.15 255); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:14px;">Step 1 of 3 — Submit Request</div>
      <div style="display:flex; gap:6px;">
        <div style="flex:1; height:4px; border-radius:999px; background:oklch(40% 0.15 255);"></div>
        <div style="flex:1; height:4px; border-radius:999px; background:oklch(88% 0.008 90);"></div>
        <div style="flex:1; height:4px; border-radius:999px; background:oklch(88% 0.008 90);"></div>
      </div>
    </div>

    <!-- ESTIMATE RECAP -->
    <div style="background:oklch(96% 0.008 240); padding:22px 26px; display:flex; justify-content:space-between; align-items:center; margin-bottom:36px;">
      <div>
        <div style="font-family:'Spectral',serif; font-size:17px; font-weight:600;">{{ recapDesc }}</div>
        <div style="font-size:12px; color:oklch(45% 0.02 260); margin-top:4px;">From your saved estimate</div>
      </div>
      <div style="font-family:'Spectral',serif; font-size:20px; font-weight:700; color:oklch(40% 0.15 255);">{{ recapRange }}</div>
    </div>

    <!-- DOCUMENT UPLOADS -->
    <div style="font-family:monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:oklch(45% 0.02 260); margin-bottom:16px;">Upload documents</div>
    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:36px;">
      <sc-for list="{{ uploads }}" as="u" hint-placeholder-count="3">
        <div onClick="{{ u.onClick }}" style="border:1.5px dashed oklch(80% 0.01 90); background:oklch(99% 0.004 90); padding:18px 22px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;">
          <div>
            <div style="font-size:14px; font-weight:600;">{{ u.label }}</div>
            <div style="font-size:12px; color:oklch(50% 0.02 260); margin-top:3px;">{{ u.hint }}</div>
          </div>
          <span style="{{ u.badgeStyle }}">{{ u.status }}</span>
        </div>
      </sc-for>
    </div>

    <!-- CONTACT & SHIPMENT DETAILS -->
    <div style="font-family:monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:oklch(45% 0.02 260); margin-bottom:16px;">Contact & shipment details</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
      <label style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:oklch(35% 0.02 260); font-weight:500;">Contact name
        <input type="text" value="{{ name }}" onChange="{{ onNameChange }}" style="padding:12px; border:1px solid oklch(82% 0.008 90); background:oklch(99% 0.004 90); font-size:15px; font-family:'Work Sans',sans-serif;"></input>
      </label>
      <label style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:oklch(35% 0.02 260); font-weight:500;">Phone
        <input type="text" value="{{ phone }}" onChange="{{ onPhoneChange }}" style="padding:12px; border:1px solid oklch(82% 0.008 90); background:oklch(99% 0.004 90); font-size:15px; font-family:'Work Sans',sans-serif;"></input>
      </label>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
      <label style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:oklch(35% 0.02 260); font-weight:500;">Email
        <input type="text" value="{{ email }}" onChange="{{ onEmailChange }}" style="padding:12px; border:1px solid oklch(82% 0.008 90); background:oklch(99% 0.004 90); font-size:15px; font-family:'Work Sans',sans-serif;"></input>
      </label>
      <label style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:oklch(35% 0.02 260); font-weight:500;">Port of entry
        <select value="{{ port }}" onChange="{{ onPortChange }}" style="padding:12px; border:1px solid oklch(82% 0.008 90); background:oklch(99% 0.004 90); font-size:15px; font-family:'Work Sans',sans-serif;">
          <option value="Tin Can Island">Tin Can Island</option>
          <option value="Apapa">Apapa</option>
        </select>
      </label>
    </div>
    <label style="display:flex; flex-direction:column; gap:8px; font-size:13px; color:oklch(35% 0.02 260); font-weight:500; margin-bottom:32px;">Additional notes <span style="color:oklch(50% 0.02 260); font-weight:400;">(optional)</span>
      <textarea value="{{ notes }}" onChange="{{ onNotesChange }}" rows="3" placeholder="Anything we should know about this shipment?" style="padding:12px; border:1px solid oklch(82% 0.008 90); background:oklch(99% 0.004 90); font-size:15px; font-family:'Work Sans',sans-serif; resize:vertical;"></textarea>
    </label>

    <a href="CheckCustoms Request Step2.dc.html" style="background:oklch(40% 0.15 255); color:oklch(98% 0.005 90); text-decoration:none; font-weight:600; font-size:15px; padding:15px 32px; border-radius:999px; display:inline-block;" style-hover="background:oklch(32% 0.15 255);">Submit request →</a>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = {
    name: 'Adaeze Okonkwo', phone: '+234 803 000 1122', email: 'adaeze@email.com', port: 'Tin Can Island', notes: '',
    uploadStatus: { 'Bill of Lading': 'Uploaded', 'Commercial Invoice': 'Uploaded', 'Form M / PAAR reference': 'Pending' }
  };

  uploadsData = [
    { label: 'Bill of Lading', hint: 'PDF or image, up to 10MB' },
    { label: 'Commercial Invoice', hint: 'PDF or image, up to 10MB' },
    { label: 'Form M / PAAR reference', hint: 'Where applicable — PDF or image' }
  ];

  getQueryParams() {
    if (typeof window === 'undefined') return {};
    const params = new URLSearchParams(window.location.search);
    return { desc: params.get('desc'), range: params.get('range') };
  }

  renderVals() {
    const q = this.getQueryParams();
    const recapDesc = q.desc || '2019 Toyota Camry — Tin Can Island';
    const recapRange = q.range || '₦10.4M – ₦11.1M';
    const uploads = this.uploadsData.map(u => {
      const status = this.state.uploadStatus[u.label];
      const done = status === 'Uploaded';
      return {
        ...u, status,
        onClick: () => this.setState(s => ({ uploadStatus: { ...s.uploadStatus, [u.label]: done ? 'Pending' : 'Uploaded' } })),
        badgeStyle: `font-size:11px; font-weight:600; padding:5px 12px; border-radius:999px; white-space:nowrap; background:${done ? 'oklch(94% 0.03 150)' : 'oklch(96% 0.03 90)'}; color:${done ? 'oklch(40% 0.1 150)' : 'oklch(45% 0.1 80)'};`
      };
    });

    return {
      recapDesc, recapRange,
      onBack: () => { if (window.history.length > 1) window.history.back(); else window.location.href = 'CheckCustoms Vehicle Estimator.dc.html'; },
      uploads,
      name: this.state.name, phone: this.state.phone, email: this.state.email, port: this.state.port, notes: this.state.notes,
      onNameChange: (e) => this.setState({ name: e.target.value }),
      onPhoneChange: (e) => this.setState({ phone: e.target.value }),
      onEmailChange: (e) => this.setState({ email: e.target.value }),
      onPortChange: (e) => this.setState({ port: e.target.value }),
      onNotesChange: (e) => this.setState({ notes: e.target.value })
    };
  }
}
</script>
</body>
</html>
